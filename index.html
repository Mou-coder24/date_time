<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: transparent; margin: 0; 
            display: flex; justify-content: center; align-items: center; 
            padding-top: 7px;
        }
        
        .pillar {
            background: #b07a52; /* Cohesive with your target tracker */
            color: #ffffff;
            padding: 24px 30px; /* Balanced padding */
            border-radius: 8px;
            width: 160px; /* Slightly wider for better text flow */
            text-align: center; /* Ensures everything is perfectly centered */
        }

        .label { 
            font-size: 8px; font-weight: 800; letter-spacing: 0.45em; 
            text-transform: uppercase; color: #fdfaf7; margin-bottom: 10px; 
            opacity: 0.85;
        }
        
        /* Larger, bolder values as requested */
        .value { 
            font-size: 32px; font-weight: 600; font-variant-numeric: tabular-nums; 
            line-height: 1; margin-bottom: 18px; 
        }
        
        .divider { 
            height: 1.5px; background: rgba(255,255,255,0.3); margin-bottom: 18px; 
        }
    </style>
</head>
<body>

<div class="pillar">
    <div class="label">Time</div>
    <div class="value" id="time">--:--</div>
    <div class="divider"></div>
    <div class="label">Date</div>
    <div class="value" id="date">-- ---</div>
</div>

<script>
    function update() {
        const now = new Date();
        document.getElementById("time").innerText = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
        
        const day = now.getDate();
        const month = now.toLocaleString('en-IN', { month: 'long' });
        document.getElementById("date").innerText = `${day} ${month}`;
    }
    update();
    setInterval(update, 60000);
</script>

</body>
</html>
